<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bokit – Lansare 28 Mai 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent: #5B8FD4;
    --accent-light: #89B4E8;
    --accent-glow: rgba(91,143,212,0.15);
    --bg: #181C27;
    --bg2: #202535;
    --bg3: #252B3D;
    --text: #F0F2F7;
    --text-muted: #7A8399;
    --border: #2E3448;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
    padding: 2.5rem 1.5rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 65% 45% at 50% -5%, rgba(91,143,212,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 35% 30% at 90% 90%, rgba(91,143,212,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }

  #particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 820px;
    width: 100%;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(91,143,212,0.1);
    border: 1px solid rgba(91,143,212,0.25);
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent-light);
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.2s;
  }

  .badge-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.75); }
  }

  .headline {
    font-size: clamp(2.8rem, 7vw, 5.5rem);
    font-weight: 700;
    line-height: 1.08;
    letter-spacing: -0.03em;
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 0.35s;
  }

  .line-1 {
    display: block;
    color: var(--text);
  }

  .line-2 {
    display: block;
    background: linear-gradient(135deg, #5B8FD4 0%, #89B4E8 60%, #B8D4F5 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .line-3 {
    display: block;
    color: var(--text-muted);
    font-weight: 300;
    font-size: 0.65em;
    letter-spacing: -0.01em;
    margin-top: 0.2em;
  }

  .subtitle {
    font-size: clamp(0.9rem, 2vw, 1.05rem);
    font-weight: 400;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 0.5s;
  }

  /* Divider */
  .divider {
    width: 1px;
    height: 48px;
    background: linear-gradient(180deg, transparent, var(--accent), transparent);
    margin: 0 auto 2.5rem;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 0.6s;
  }

  .launch-block {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 0.75s;
  }

  .launch-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .launch-date {
    font-size: clamp(1.6rem, 4.5vw, 2.8rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .countdown {
    display: flex;
    gap: clamp(0.5rem, 2vw, 1rem);
    justify-content: center;
    align-items: flex-start;
    margin-top: 2rem;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 0.9s;
  }

  .countdown-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    min-width: 76px;
  }

  .countdown-num {
    font-size: clamp(1.8rem, 4.5vw, 2.8rem);
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .countdown-unit {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .countdown-sep {
    font-size: clamp(1.8rem, 4.5vw, 2.6rem);
    color: var(--accent);
    opacity: 0.35;
    padding-top: 1rem;
    line-height: 1;
    font-weight: 300;
  }

  .bottom {
    margin-top: 3rem;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 1.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .logo-text {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--border);
  }

  .bottom-line {
    width: 32px;
    height: 1px;
    background: var(--border);
  }

  .founder {
    margin-top: 1.5rem;
    font-size: 11px;
    font-weight: 400;
    color: var(--border);
    letter-spacing: 0.05em;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 1.25s;
  }

  .founder strong {
    color: var(--text-muted);
    font-weight: 500;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    body { padding: 2rem 1rem; }
    .headline { font-size: clamp(2.2rem, 10vw, 3.2rem); }
    .countdown-item { min-width: 60px; padding: 0.75rem 0.9rem; }
    .countdown-sep { padding-top: 0.75rem; }
    .badge { font-size: 10px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="badge">
    <span class="badge-dot"></span>
    Curând disponibil
  </div>

  <h1 class="headline">
    <span class="line-1">Cea mai mare</span>
    <span class="line-2">platformă de rezervări</span>
    <span class="line-3">și organizare</span>
  </h1>

  <p class="subtitle">
    O experiență construită pentru cei care vor mai mult.
  </p>

  <div class="divider"></div>

  <div class="launch-block">
    <span class="launch-label">Data lansării</span>
    <div class="launch-date">28 Mai 2026</div>
  </div>

  <div class="countdown">
    <div class="countdown-item">
      <span class="countdown-num" id="cd-days">--</span>
      <span class="countdown-unit">Zile</span>
    </div>
    <span class="countdown-sep">:</span>
    <div class="countdown-item">
      <span class="countdown-num" id="cd-hours">--</span>
      <span class="countdown-unit">Ore</span>
    </div>
    <span class="countdown-sep">:</span>
    <div class="countdown-item">
      <span class="countdown-num" id="cd-mins">--</span>
      <span class="countdown-unit">Minute</span>
    </div>
    <span class="countdown-sep">:</span>
    <div class="countdown-item">
      <span class="countdown-num" id="cd-secs">--</span>
      <span class="countdown-unit">Secunde</span>
    </div>
  </div>

  <div class="bottom">
    <div class="bottom-line"></div>
    <span class="logo-text">Bokit</span>
    <div class="bottom-line"></div>
  </div>

  <p class="founder">creat de <strong>Ghiță Robert</strong></p>

</div>

<canvas id="particles"></canvas>

<script>
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function rand(min, max) { return Math.random() * (max - min) + min; }

  for (let i = 0; i < 55; i++) {
    particles.push({
      x: rand(0, window.innerWidth),
      y: rand(0, window.innerHeight),
      r: rand(0.5, 2),
      dx: rand(-0.15, 0.15),
      dy: rand(-0.3, -0.05),
      opacity: rand(0.1, 0.45)
    });
  }

  function drawParticles() {
    ctx.clearRect(0, 0, W, H);
    for (let p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(91,143,212,' + p.opacity + ')';
      ctx.fill();

      p.x += p.dx;
      p.y += p.dy;

      if (p.y < -5) { p.y = H + 5; p.x = rand(0, W); }
      if (p.x < -5) p.x = W + 5;
      if (p.x > W + 5) p.x = -5;
    }
    requestAnimationFrame(drawParticles);
  }
  drawParticles();

  const target = new Date('2026-05-28T00:00:00').getTime();
  function update() {
    const diff = target - Date.now();
    if (diff <= 0) {
      ['cd-days','cd-hours','cd-mins','cd-secs'].forEach(id => document.getElementById(id).textContent = '00');
      return;
    }
    document.getElementById('cd-days').textContent  = String(Math.floor(diff / 86400000)).padStart(2,'0');
    document.getElementById('cd-hours').textContent = String(Math.floor((diff % 86400000) / 3600000)).padStart(2,'0');
    document.getElementById('cd-mins').textContent  = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0');
    document.getElementById('cd-secs').textContent  = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0');
  }
  update();
  setInterval(update, 1000);
</script>
</body>
</html>
