<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bokit</title>
  <style>
    :root {
      --bg-main: #f6efe4;
      --bg-accent: #ead8bf;
      --text-main: #16221b;
      --text-soft: #526256;
      --card: rgba(255, 252, 246, 0.72);
      --border: rgba(22, 34, 27, 0.1);
      --highlight: #d86c3d;
      --shadow: 0 24px 80px rgba(54, 42, 20, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow: hidden;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top left, rgba(216, 108, 61, 0.18), transparent 30%),
        radial-gradient(circle at right center, rgba(122, 154, 122, 0.18), transparent 28%),
        linear-gradient(135deg, var(--bg-main), #f8f4ed 45%, var(--bg-accent));
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 999px;
      filter: blur(10px);
      opacity: 0.8;
      pointer-events: none;
    }

    body::before {
      width: 320px;
      height: 320px;
      top: -80px;
      left: -70px;
      background: rgba(216, 108, 61, 0.12);
    }

    body::after {
      width: 360px;
      height: 360px;
      right: -120px;
      bottom: -120px;
      background: rgba(120, 156, 127, 0.12);
    }

    .hero {
      width: min(820px, 100%);
      padding: 56px 38px;
      text-align: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
    }

    .brand {
      margin: 0 0 18px;
      font-size: clamp(1rem, 2vw, 1.1rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 6vw, 4.8rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .accent {
      color: var(--highlight);
    }

    .launch {
      margin: 28px auto 0;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(22, 34, 27, 0.08);
      font-family: Arial, sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .launch strong {
      color: var(--text-main);
    }

    @media (max-width: 640px) {
      .hero {
        padding: 42px 24px;
        border-radius: 22px;
      }

      .brand {
        letter-spacing: 0.28em;
      }

      .launch {
        padding: 11px 14px;
        font-size: 0.82rem;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <p class="brand">Bokit</p>
    <h1>Cea mai mare platforma de <span class="accent">rezervari si organizare</span> din Romania!</h1>
    <div class="launch">Lansare <strong>1 iunie 2026</strong></div>
  </main>
</body>
</html>
