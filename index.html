<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bokit – Lansare 28 Mai 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&subset=latin-ext&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent: #5B8FD4;
    --accent-light: #89B4E8;
    --dark: #181C27;
    --dark2: #202535;
  }

  html, body {
    height: 100%;
    background: var(--dark);
    color: white;
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
    overflow-y: auto;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 55% at 50% -5%, rgba(91,143,212,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 40% 35% at 85% 85%, rgba(91,143,212,0.07) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 3rem 2rem;
    max-width: 860px;
    width: 100%;
  }

  .top-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.2s;
  }

  .ornament-line {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent));
  }
  .ornament-line.right {
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .ornament-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent);
  }

  .ornament-text {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent-light);
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 8vw, 6.5rem);
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 0.2em;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.4s;
  }

  .headline .word-cea {
    display: block;
    color: white;
  }

  .headline .word-mai-mare {
    display: block;
    font-style: italic;
    font-weight: 400;
    font-size: 0.82em;
    color: var(--accent-light);
  }

  .headline .word-platforma {
    display: block;
    color: rgba(255,255,255,0.88);
    font-size: 0.72em;
    font-weight: 400;
    letter-spacing: 0.01em;
  }

  .subtitle {
    font-size: clamp(0.95rem, 2.5vw, 1.1rem);
    font-weight: 300;
    color: rgba(255,255,255,0.42);
    letter-spacing: 0.04em;
    margin-top: 1rem;
    margin-bottom: 2rem;
    line-height: 1.7;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.6s;
  }

  .divider {
    width: 1px;
    height: 56px;
    background: linear-gradient(180deg, transparent, var(--accent), transparent);
    margin: 0 auto 2rem;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.7s;
  }

  .launch-block {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.9s;
  }

  .launch-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--accent-light);
  }

  .launch-date {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 3.2rem);
    font-weight: 700;
    letter-spacing: 0.05em;
    color: white;
    position: relative;
  }

  .launch-date::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 10%;
    right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .countdown {
    display: flex;
    gap: clamp(1rem, 4vw, 3rem);
    justify-content: center;
    margin-top: 2rem;
    opacity: 0;
    animation: fadeUp 1s ease forwards 1.1s;
  }

  .countdown-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .countdown-num {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    color: white;
    line-height: 1;
    min-width: 2ch;
    text-align: center;
  }

  .countdown-unit {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.28);
  }

  .countdown-sep {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: var(--accent);
    opacity: 0.35;
    align-self: flex-start;
    line-height: 1;
  }

  .bottom-ornament {
    margin-top: 2.5rem;
    opacity: 0;
    animation: fadeUp 1s ease forwards 1.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.16);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  
    .countdown { gap: 1.2rem; }
    .ornament-line { width: 30px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="top-ornament">
    <div class="ornament-line"></div>
    <div class="ornament-dot"></div>
    <span class="ornament-text">Curând disponibil</span>
    <div class="ornament-dot"></div>
    <div class="ornament-line right"></div>
  </div>

  <h1 class="headline">
    <span class="word-cea">Cea mai mare</span>
    <span class="word-mai-mare">platformă de rezervări</span>
    <span class="word-platforma">și organizare.</span>
  </h1>

  <p class="subtitle">
    O experiență construită pentru cei care vor mai mult.
  </p>

  <div class="divider"></div>

  <div class="launch-block">
    <span class="launch-label">Data lansării</span>
    <div class="launch-date">28 Mai 2026</div>
  </div>

  <div class="countdown">
    <div class="countdown-item">
      <span class="countdown-num" id="cd-days">--</span>
      <span class="countdown-unit">Zile</span>
    </div>
    <span class="countdown-sep">·</span>
    <div class="countdown-item">
      <span class="countdown-num" id="cd-hours">--</span>
      <span class="countdown-unit">Ore</span>
    </div>
    <span class="countdown-sep">·</span>
    <div class="countdown-item">
      <span class="countdown-num" id="cd-mins">--</span>
      <span class="countdown-unit">Minute</span>
    </div>
    <span class="countdown-sep">·</span>
    <div class="countdown-item">
      <span class="countdown-num" id="cd-secs">--</span>
      <span class="countdown-unit">Secunde</span>
    </div>
  </div>

  <div class="bottom-ornament">
    <div class="ornament-line" style="width:40px"></div>
    <span class="logo-text">Bokit</span>
    <div class="ornament-line right" style="width:40px"></div>
  </div>

</div>

<script>
  const target = new Date('2026-05-28T00:00:00').getTime();
  function update() {
    const diff = target - Date.now();
    if (diff <= 0) {
      ['cd-days','cd-hours','cd-mins','cd-secs'].forEach(id => document.getElementById(id).textContent = '00');
      return;
    }
    document.getElementById('cd-days').textContent  = String(Math.floor(diff / 86400000)).padStart(2,'0');
    document.getElementById('cd-hours').textContent = String(Math.floor((diff % 86400000) / 3600000)).padStart(2,'0');
    document.getElementById('cd-mins').textContent  = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0');
    document.getElementById('cd-secs').textContent  = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0');
  }
  update();
  setInterval(update, 1000);
</script>
</body>
</html>
